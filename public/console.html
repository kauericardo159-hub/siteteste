<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento - Project Z</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #29292e;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 {
            color: #04d361;
            font-size: 24px;
        }

        .btn-atualizar {
            background-color: #04d361;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-atualizar:hover {
            background-color: #06b253;
        }

        .status-card {
            background-color: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #8257e5;
        }

        .status-ok { background-color: #04d361; }
        .status-erro { background-color: #f75a68; }

        .tabela-container {
            background-color: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            overflow: hidden;
        }

        .tabela-titulo {
            background-color: #29292e;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #29292e;
        }

        th {
            background-color: #121214;
            color: #8d8d99;
            font-size: 14px;
            text-transform: uppercase;
        }

        tr:hover {
            background-color: #29292e;
        }

        .badge-id {
            background-color: #323238;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #8257e5;
        }

        .badge-username {
            color: #04d361;
            font-weight: bold;
        }

        .logs-reais {
            margin-top: 20px;
            background-color: #09090a;
            border: 1px solid #29292e;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            color: #a8a8b3;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Console de Monitoramento</h1>
            <p style="color: #8d8d99; font-size: 14px;">Project Z Server Debugger</p>
        </div>
        <button class="btn-atualizar" onclick="buscarDadosDoBanco()">🔄 Atualizar Dados</button>
    </header>

    <div class="status-card">
        <div id="status-bola" class="status-indicator"></div>
        <p id="status-texto">Testando conexão com o Supabase...</p>
    </div>

    <div class="tabela-container">
        <div class="tabela-titulo">Tabela: perfis (Usuários Cadastrados)</div>
        <table>
            <thead>
                <tr>
                    <th>ID Único (UUID)</th>
                    <th>@ Username</th>
                    <th>Criado Em (Data/Hora)</th>
                </tr>
            </thead>
            <tbody id="tabela-usuarios">
                <tr>
                    <td colspan="3" style="text-align: center; color: #8d8d99;">Clique em Atualizar para puxar os registros...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="logs-reais" id="log-terminal">
        [SISTEMA] Console carregado. Aguardando comandos...
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Suas credenciais injetadas diretamente para o painel funcionar isolado
        const SUPABASE_URL = "https://bdidmnhjololaamnxrlc.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_Qq_4xTnK9jvOqSuvAUi1VQ_XRoyS6Tv";

        // Inicializa o Supabase internamente nesta página
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para escrever mensagens no mini terminal abaixo da tela
        function registrarLog(mensagem, tipo = 'info') {
            const terminal = document.getElementById('log-terminal');
            const hora = new Date().toLocaleTimeString();
            let cor = '#a8a8b3';
            if (tipo === 'sucesso') cor = '#04d361';
            if (tipo === 'erro') cor = '#f75a68';

            terminal.innerHTML += `<br><span style="color: ${cor}">[${hora}] ${mensagem}</span>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Função principal que vai no Supabase ler a tabela 'perfis'
        async function buscarDadosDoBanco() {
            registrarLog("Buscando dados na tabela 'perfis'...");
            const bolaStatus = document.getElementById('status-bola');
            const textoStatus = document.getElementById('status-texto');
            const tabelaBody = document.getElementById('tabela-usuarios');

            try {
                // Faz a busca (SELECT * FROM perfis) ordenada pelo mais recente
                const { data, error } = await supabaseClient
                    .from('perfis')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Atualiza o card de status para Sucesso
                bolaStatus.className = "status-indicator status-ok";
                textoStatus.innerText = "Conexão com o Supabase: OK (Dados sincronizados)";
                registrarLog(`Sucesso! ${data.length} usuário(s) encontrado(s).`, 'sucesso');

                // Limpa a tabela
                tabelaBody.innerHTML = "";

                if (data.length === 0) {
                    tabelaBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #8d8d99;">Nenhum usuário cadastrado ainda no banco.</td></tr>`;
                    return;
                }

                // Preenche a tabela com os registros reais do banco
                data.forEach(user => {
                    const dataFormatada = new Date(user.created_at).toLocaleString('pt-BR');
                    tabelaBody.innerHTML += `
                        <tr>
                            <td><span class="badge-id">${user.id}</span></td>
                            <td><span class="badge-username">@${user.username}</span></td>
                            <td>${dataFormatada}</td>
                        </tr>
                    `;
                });

            } catch (err) {
                // Trata erros caso a tabela não exista ou as chaves estejam erradas
                bolaStatus.className = "status-indicator status-erro";
                textoStatus.innerText = "Erro ao conectar com o Supabase!";
                registrarLog(`ERRO: ${err.message}`, 'erro');
                
                tabelaBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #f75a68;">Falha ao carregar dados: ${err.message}</td></tr>`;
            }
        }

        // Executa automaticamente ao abrir a página pela primeira vez
        buscarDadosDoBanco();
    </script>
</body>
</html>
