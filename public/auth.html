<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Z Clone - Entrar / Cadastrar</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <h1>Project <span>Z</span></h1>
            <p id="auth-subtitulo">Entre na sua conta para conversar</p>
        </div>

        <!-- FORMULÁRIO DE LOGIN (POR USERNAME) -->
        <form id="form-login" class="auth-form">
            <div class="input-group">
                <label for="login-username">Nome de Usuário (@)</label>
                <input type="text" id="login-username" required placeholder="Digite seu username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="login-senha">Senha de Acesso</label>
                <input type="password" id="login-senha" required placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-auth">Entrar no Sistema</button>
            <p class="mudar-tela">Novo por aqui? <a href="#" id="ir-para-cadastro">Criar nova conta</a></p>
        </form>

        <!-- FORMULÁRIO DE CADASTRO (E-MAIL OPCIONAL) -->
        <form id="form-cadastro" class="auth-form" style="display: none;">
            <div class="input-group">
                <label for="cad-username">Defina seu @ único</label>
                <input type="text" id="cad-username" required placeholder="apenas_letras_e_numeros" autocomplete="off">
                <small class="input-dica">Use apenas minúsculas, números, hífens ou underlines.</small>
            </div>

            <div class="input-group">
                <label for="cad-email">Endereço de E-mail <span class="opcional">(Opcional)</span></label>
                <input type="email" id="cad-email" placeholder="seu@email.com (Não obrigatório)">
            </div>
            
            <div class="input-group">
                <label for="cad-senha">Crie uma Senha</label>
                <input type="password" id="cad-senha" required placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" class="btn-auth btn-cadastro">Finalizar Cadastro</button>
            <p class="mudar-tela">Já possui registro? <a href="#" id="ir-para-login">Fazer Login</a></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
