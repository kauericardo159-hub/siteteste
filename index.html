<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Z Clone - Home</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

    <div id="loading" class="tela-centrada">
        <div class="spinner"></div>
        <p>Verificando sessão...</p>
    </div>

    <div id="main-content" class="home-container" style="display: none;">
        <header class="home-header">
            <div class="user-info">
                <div class="avatar-placeholder"></div>
                <div>
                    <h2 id="user-username">@carregando...</h2>
                    <span id="user-id" class="badge-id">ID: ...</span>
                </div>
            </div>
            <button id="btn-sair" class="btn-sair">Sair</button>
        </header>

        <main class="home-body">
            <div class="welcome-box">
                <h3>Bem-vindo ao feed do Project Z Clone!</h3>
                <p>O seu servidor e o banco de dados estão conectados. Em breve, os chats e círculos aparecerão aqui.</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/supabase.js"></script>
    
    <script src="js/home.js"></script>
</body>
</html>
